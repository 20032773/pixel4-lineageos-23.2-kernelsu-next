<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <link rel="stylesheet" href="/internal/insets.css">
  <link rel="stylesheet" href="style.css">
  <title>實體 GNSS 控制</title>
</head>
<body>
  <main>
    <header class="hero">
      <div class="hero-icon" aria-hidden="true">◎</div>
      <p class="label">BYYA LOCATION LAB</p>
      <h1>實體 GNSS<br>訊號控制</h1>
      <p class="summary">系統定位、Google 定位與 App 權限保持開啟；只處理真實衛星來源。</p>
    </header>

    <section class="status-card" aria-live="polite">
      <div class="status-orb" id="orb"><span></span></div>
      <div><p class="label">目前模式</p><h2 id="status">讀取中…</h2><p id="details">正在檢查 GNSS HAL</p></div>
    </section>

    <section class="mode-group" aria-label="GNSS 模式">
      <button data-mode="normal">
        <span class="mode-icon">◉</span><span class="mode-copy"><strong>完整訊號</strong><small>原廠 GNSS 與 A‑GPS 全部運作</small></span><span class="check">✓</span>
      </button>
      <button data-mode="weaken">
        <span class="mode-icon">◌</span><span class="mode-copy"><strong>弱化輔助</strong><small>清除 aiding data，暫停 A‑GPS 輔助服務</small></span><span class="check">✓</span>
      </button>
      <button data-mode="isolate" class="recommended">
        <span class="mode-icon">⊘</span><span class="mode-copy"><strong>隔離真實 GNSS</strong><small>停止衛星 HAL，mock 定位仍可運作</small></span><span class="check">✓</span>
      </button>
    </section>

    <section class="conditions">
      <div><span id="location-dot"></span><p><strong>Android 定位開關</strong><small id="location-state">檢查中</small></p></div>
      <div><span class="ok"></span><p><strong>App 定位權限</strong><small>本模組完全不修改</small></p></div>
    </section>

    <aside><strong>建議：</strong>飛行時使用「隔離真實 GNSS」。弱化模式仍可能收到衛星訊號，因此仍可能被真實位置拉回。</aside>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
