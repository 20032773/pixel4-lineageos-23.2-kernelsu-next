name: Build Pixel 4 Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_ref:
        description: Kernel commit pinned to the LineageOS 20260709 flame build
        required: true
        default: 9a2ea17c379a62b4044efee9de9a14143d9bbcfa
        type: string
      ksun_ref:
        description: KernelSU Next legacy branch, tag, or commit
        required: true
        default: fd093e8b879063aeb0192a3959b0652101ded623
        type: string

permissions:
  contents: read

concurrency:
  group: pixel4-flame-kernel-abi-v2-${{ github.ref }}
  cancel-in-progress: true

env:
  KERNEL_REPO: https://github.com/LineageOS/android_kernel_google_msm-4.14.git
  KSUN_REPO: https://github.com/KernelSU-Next/KernelSU-Next.git
  KSU_HOOKS_REPO: https://github.com/devnoname120/kernelsu-coccinelle.git
  KSU_HOOKS_COMMIT: 9e30076418813fc7eaab6481da2e745dfde56249
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git
  ANYKERNEL_COMMIT: 1c9a500dd4aa8081952523126e97eb155aed941b
  KERNEL_NAME: byya-pokemon-master
  KERNEL_CHANNEL: lineage-23.2-20260709
  LINEAGE_KERNEL_COMMIT: 9a2ea17c379a62b4044efee9de9a14143d9bbcfa
  LINEAGE_BOOT_URL: https://mirrorbits.lineageos.org/full/flame/20260709/boot.img
  LINEAGE_BOOT_SHA256: 4cac9e822bd2dbb22ac92338448a470ce8ac42657f583b7a8198f5cb9613b4f0
  AOSP_CLANG_COMMIT: 21b19c041de1f1df9b97fd9902ae5405c6cf8eb9
  AOSP_CLANG_DIR: clang-r563880c

jobs:
  build:
    name: Build byya-pokemon-master for Pixel 4 (flame)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout builder repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bc binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi bison \
            build-essential ccache coccinelle curl device-tree-compiler flex git \
            libelf-dev libncurses5-dev libssl-dev libxml2 lz4 python3 rsync zip

      - name: Download official AOSP toolchain and clone LineageOS kernel
        env:
          KERNEL_REF: ${{ inputs.kernel_ref }}
        run: |
          set -euxo pipefail
          mkdir -p clang-toolchain
          curl --fail --location --retry 5 \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/$AOSP_CLANG_COMMIT/$AOSP_CLANG_DIR.tar.gz" \
            | tar -xz -C clang-toolchain
          clang-toolchain/bin/clang --version | tee clang-version.txt
          grep -q 'Android (14054515' clang-version.txt
          grep -q 'based on r563880c' clang-version.txt
          git init kernel-source
          git -C kernel-source remote add origin "$KERNEL_REPO"
          git -C kernel-source fetch --depth=1 origin "$KERNEL_REF"
          git -C kernel-source checkout --detach FETCH_HEAD
          test "$(git -C kernel-source rev-parse HEAD)" = "$LINEAGE_KERNEL_COMMIT"
          (cd kernel-source && scripts/setlocalversion --save-scmversion .)
          BASE_SCM_VERSION="$(cat kernel-source/.scmversion)"
          test -n "$BASE_SCM_VERSION"
          {
            echo "device=Google Pixel 4 (flame)"
            echo "kernel_name=$KERNEL_NAME"
            echo "kernel_ref=$KERNEL_REF"
            echo "kernel_commit=$(git -C kernel-source rev-parse HEAD)"
            echo "base_scm_version=$BASE_SCM_VERSION"
            echo "lineage_boot_url=$LINEAGE_BOOT_URL"
            echo "lineage_boot_sha256=$LINEAGE_BOOT_SHA256"
            echo "aosp_clang_commit=$AOSP_CLANG_COMMIT"
            echo "aosp_clang_dir=$AOSP_CLANG_DIR"
          } > build-info.txt

      - name: Extract the exact config from official LineageOS boot.img
        run: |
          set -euxo pipefail
          curl --fail --location --retry 5 "$LINEAGE_BOOT_URL" -o lineage-boot.img
          echo "$LINEAGE_BOOT_SHA256  lineage-boot.img" | sha256sum --check --strict

          curl --fail --location --retry 5 \
            'https://android.googlesource.com/platform/system/tools/mkbootimg/+/refs/heads/main/unpack_bootimg.py?format=TEXT' \
            | base64 --decode > unpack_bootimg.py
          python3 unpack_bootimg.py --boot_img lineage-boot.img --out lineage-boot
          lz4 -d lineage-boot/kernel lineage-official-Image
          kernel-source/scripts/extract-ikconfig lineage-official-Image > lineage-official.config

          test -s lineage-official.config
          grep -qx 'CONFIG_LOCALVERSION=""' lineage-official.config
          grep -qx 'CONFIG_LOCALVERSION_AUTO=y' lineage-official.config
          grep -qx 'CONFIG_LTO_CLANG=y' lineage-official.config
          grep -qx '# CONFIG_THINLTO is not set' lineage-official.config
          grep -qx 'CONFIG_CFI_CLANG=y' lineage-official.config
          grep -qx 'CONFIG_SHADOW_CALL_STACK=y' lineage-official.config

      - name: Build unmodified LineageOS ABI baseline
        run: |
          set -euxo pipefail
          cd kernel-source
          mkdir -p out-baseline
          cp ../lineage-official.config out-baseline/.config
          export PATH="$GITHUB_WORKSPACE/clang-toolchain/bin:$PATH"
          make O=out-baseline ARCH=arm64 CC=clang olddefconfig
          cmp -s ../lineage-official.config out-baseline/.config || {
            echo 'error: kernel olddefconfig changed the official LineageOS config' >&2
            diff -u ../lineage-official.config out-baseline/.config || true
            exit 1
          }

          make -j"$(nproc)" O=out-baseline ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CLANG_PREFIX32=--prefix=/usr/bin/arm-linux-gnueabi- \
            CROSS_COMPILE=/usr/bin/aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=/usr/bin/arm-linux-gnueabi- \
            Image.lz4 2>&1 | tee ../baseline-build.log

          test -s out-baseline/Module.symvers
          test -s out-baseline/arch/arm64/boot/Image.lz4
          echo "baseline_symbols=$(wc -l < out-baseline/Module.symvers)" >> ../build-info.txt

      - name: Integrate KernelSU Next legacy
        env:
          REQUESTED_KSUN_REF: ${{ inputs.ksun_ref }}
        run: |
          set -euxo pipefail
          KSUN_REF="$REQUESTED_KSUN_REF"
          test -n "$KSUN_REF"

          # Keep the repository metadata: KernelSU uses it for its version code.
          git clone --branch legacy --single-branch "$KSUN_REPO" KernelSU-Next
          if ! git -C KernelSU-Next checkout --detach "$KSUN_REF"; then
            git -C KernelSU-Next fetch origin "$KSUN_REF"
            git -C KernelSU-Next checkout --detach FETCH_HEAD
          fi

          KSUN_COMMIT="$(git -C KernelSU-Next rev-parse HEAD)"
          KSUN_GIT_COUNT="$(git -C KernelSU-Next rev-list --count HEAD)"
          KSUN_VERSION="$((30000 + KSUN_GIT_COUNT + 200))"
          {
            echo "ksun_ref=$KSUN_REF"
            echo "ksun_commit=$KSUN_COMMIT"
            echo "ksun_version=$KSUN_VERSION"
          } >> build-info.txt

          cd kernel-source
          ln -s ../../KernelSU-Next/kernel drivers/kernelsu

          if [ ! -e include/linux/pgtable.h ]; then
            printf '%s\n' '#include <asm/pgtable.h>' > include/linux/pgtable.h
          fi

          python3 ../patch_ksun_legacy.py
          grep -qF 'obj-$(CONFIG_KSU) += kernelsu/' drivers/Makefile || \
            printf '%s\n' 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig || \
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Apply KernelSU manual hooks
        run: |
          set -euxo pipefail
          cd kernel-source
          git clone "$KSU_HOOKS_REPO" kernelsu-coccinelle
          git -C kernelsu-coccinelle checkout --detach "$KSU_HOOKS_COMMIT"

          SP_FILE="$(realpath kernelsu-coccinelle/classic-hooks/kernelsu.cocci)"
          HOOK_FILES="$(grep -Po 'file in "\K[^"]+' "$SP_FILE" | sort -u)"
          while IFS= read -r file; do
            # KernelSU Next legacy does not export the obsolete devpts handler.
            if [ "$file" = 'fs/devpts/inode.c' ]; then
              continue
            fi
            spatch --very-quiet --sp-file "$SP_FILE" --in-place \
              --linux-spacing "$file" || true
          done <<< "$HOOK_FILES"
          rm -rf kernelsu-coccinelle

          python3 ../patch_manual_hooks.py

          if grep -q 'ksu_handle_devpts' fs/devpts/inode.c; then
            echo 'error: obsolete KernelSU devpts hook was installed' >&2
            exit 1
          fi
          grep -q 'ksu_handle_execveat' fs/exec.c
          grep -q 'ksu_handle_faccessat' fs/open.c
          grep -q 'ksu_handle_input_handle_event' drivers/input/input.c
          grep -q 'ksu_handle_vfs_read' fs/read_write.c
          grep -q 'ksu_handle_stat' fs/stat.c
          grep -q '^int path_umount' fs/namespace.c
          grep -q 'ksu_handle_sys_reboot' kernel/reboot.c

      - name: Configure Pixel 4 kernel
        run: |
          set -euxo pipefail
          cd kernel-source
          cat > /tmp/kernelsu-next.config <<EOF
          CONFIG_LOCALVERSION=""
          CONFIG_LOCALVERSION_AUTO=y
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          # CONFIG_KSU_DEBUG is not set
          # CONFIG_KSU_KPROBES_HOOK is not set
          # CONFIG_KSU_HOOK_KPROBES is not set
          # CONFIG_KSU_WITH_KPROBES is not set
          # CONFIG_THINLTO is not set
          EOF

          mkdir -p out
          scripts/kconfig/merge_config.sh -m -O out \
            ../lineage-official.config \
            /tmp/kernelsu-next.config

          export PATH="$GITHUB_WORKSPACE/clang-toolchain/bin:$PATH"
          make O=out ARCH=arm64 CC=clang olddefconfig

          grep -qx 'CONFIG_LOCALVERSION=""' out/.config
          grep -qx 'CONFIG_LOCALVERSION_AUTO=y' out/.config
          grep -qx 'CONFIG_KSU=y' out/.config
          grep -qx 'CONFIG_KSU_MANUAL_HOOK=y' out/.config
          grep -qx '# CONFIG_KSU_DEBUG is not set' out/.config
          grep -qx 'CONFIG_LTO_CLANG=y' out/.config
          grep -qx 'CONFIG_CFI_CLANG=y' out/.config
          grep -qx '# CONFIG_THINLTO is not set' out/.config
          if grep -Eq '^CONFIG_KSU_(KPROBES_HOOK|HOOK_KPROBES|WITH_KPROBES)=y$' out/.config; then
            echo 'error: KernelSU kprobe hooks conflict with manual hooks' >&2
            exit 1
          fi

      - name: Build Image.lz4
        run: |
          set -euxo pipefail
          cd kernel-source
          export PATH="$GITHUB_WORKSPACE/clang-toolchain/bin:$PATH"
          test -x /usr/bin/arm-linux-gnueabi-ld.bfd

          make -j"$(nproc)" O=out ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            KBUILD_BUILD_USER="$KERNEL_NAME" \
            KBUILD_BUILD_HOST=PokemonMaster \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CLANG_PREFIX32=--prefix=/usr/bin/arm-linux-gnueabi- \
            CROSS_COMPILE=/usr/bin/aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=/usr/bin/arm-linux-gnueabi- \
            Image.lz4 2>&1 | tee ../build.log

          test -s out/arch/arm64/boot/Image.lz4
          test -s out/include/config/kernel.release
          if grep -Fq "$KERNEL_NAME" out/include/config/kernel.release; then
            echo 'error: custom name leaked into module vermagic' >&2
            exit 1
          fi
          echo "kernel_release=$(cat out/include/config/kernel.release)" >> ../build-info.txt
          grep -aFq "$KERNEL_NAME" out/arch/arm64/boot/Image

      - name: Verify every vendor-module symbol CRC
        run: |
          set -euxo pipefail
          python3 verify_module_abi.py \
            kernel-source/out-baseline/Module.symvers \
            kernel-source/out/Module.symvers \
            --report module-abi-report.txt
          grep -qx 'missing_symbols=0' module-abi-report.txt
          grep -qx 'changed_crcs=0' module-abi-report.txt
          cat module-abi-report.txt >> build-info.txt

      - name: Pack flame-only AnyKernel3 ZIP
        run: |
          set -euxo pipefail
          git init AnyKernel3-base
          git -C AnyKernel3-base remote add origin "$ANYKERNEL_REPO"
          git -C AnyKernel3-base fetch --depth=1 origin "$ANYKERNEL_COMMIT"
          git -C AnyKernel3-base checkout --detach FETCH_HEAD
          test "$(git -C AnyKernel3-base rev-parse HEAD)" = "$ANYKERNEL_COMMIT"
          echo "anykernel_commit=$ANYKERNEL_COMMIT" >> build-info.txt

          cp -a AnyKernel3-base AnyKernel3-flame
          rm -rf AnyKernel3-flame/.git
          cp kernel-source/out/arch/arm64/boot/Image.lz4 AnyKernel3-flame/
          cp anykernel.sh AnyKernel3-flame/anykernel.sh

          grep -qx 'device.name1=flame' AnyKernel3-flame/anykernel.sh
          if grep -Eq '^device\.name[0-9]+=(coral|sunfish)$' AnyKernel3-flame/anykernel.sh; then
            echo 'error: non-flame Pixel device was allowed by AnyKernel' >&2
            exit 1
          fi

          UPDATER=AnyKernel3-flame/META-INF/com/google/android/update-binary
          printf '\nsync;\nexit 0;\n' >> "$UPDATER"

          (cd AnyKernel3-flame && \
            zip -r9 "../$KERNEL_NAME-flame-LineageOS-$KERNEL_CHANNEL-KernelSU-Next.zip" . \
              -x 'README.md')

      - name: Collect build outputs
        if: success()
        run: |
          set -euxo pipefail
          mkdir -p release
          cp "$KERNEL_NAME-flame-LineageOS-$KERNEL_CHANNEL-KernelSU-Next.zip" release/
          cp kernel-source/out/arch/arm64/boot/Image.lz4 release/
          cp kernel-source/out/.config release/kernel.config
          cp module-abi-report.txt release/
          cp build-info.txt release/
          sha256sum release/* > release/SHA256SUMS

      - name: Upload flashable build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: byya-pokemon-master-flame-lineage-23.2-20260709-KernelSU-Next
          path: release/
          if-no-files-found: error
          retention-days: 30

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flame-build-failure-diagnostics
          path: |
            build.log
            baseline-build.log
            build-info.txt
            module-abi-report.txt
            clang-version.txt
            kernel-source/out/.config
            kernel-source/out/Module.symvers
            kernel-source/out-baseline/Module.symvers
            kernel-source/**/*.rej
          if-no-files-found: ignore
          retention-days: 14
